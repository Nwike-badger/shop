# =============================================================================
# PRODUCTION-READY APPLICATION.PROPERTIES
# =============================================================================
# ? This file contains all critical configurations needed for 10,000+ orders/day
#
# WHAT'S CONFIGURED:
# 1. MongoDB Connection Pool (handles 500+ concurrent requests)
# 2. Redis Caching (reduces DB load by 80%)
# 3. Thread Pool Sizing (async event processing)
# 4. Monitoring & Observability
# 5. Performance Tuning
# =============================================================================

# -----------------------------------------------------------------------------
# MONGODB CONFIGURATION ? HIGH CONCURRENCY SETTINGS
# -----------------------------------------------------------------------------
# Using ENV variable for URI to easily switch between local and MongoDB Atlas
#spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/visit-aba}?maxPoolSize=300&minPoolSize=50&maxIdleTimeMS=60000&maxConnectionLifeTimeMS=300000&waitQueueTimeoutMS=5000&serverSelectionTimeoutMS=5000

spring.data.mongodb.uri=${MONGO_URI}

#spring.data.mongodb.database=${MONGO_DATABASE:visit-aba}
spring.data.mongodb.database=${MONGO_DATABASE:explore-aba}
spring.data.mongodb.auto-index-creation=${MONGO_AUTO_INDEX:true}

app.admin.email=exploreabanow@gmail.com
app.admin.password=${ADMIN_PASSWORD}

#  cors.allowed-origins=https://my-production-domain.com
# Add your localtunnel URL right next to localhost
cors.permitted-origins=http://localhost:5173,https://visit-aba.vercel.app,https://www.exploreaba.ng

# Business Configuration
app.tax.vat-rate=${VAT_RATE:0}
app.shippingFee=${SHIPPING_FEE:0}

# Ensure events fire even outside transactions
spring.application.events.publish-asynchronously=true

# Monnify Test Credentials
monnify.api-key=${MONNIFY_API_KEY}
monnify.secret-key=${MONNIFY_SECRET_KEY}
monnify.contract-code=${MONNIFY_CONTRACT_CODE}
monnify.base-url=https://sandbox.monnify.com
monnify.redirect-url=${MONNIFY_REDIRECT_URL}

# Resend Configuration
resend.api-key=${RESEND_API_KEY}
resend.from-email=ExploreAba <orders@exploreaba.ng>
app.frontend-url=https://visit-aba.vercel.app/


# -----------------------------------------------------------------------------
# SECURITY SETTINGS & SECRETS (NO FALLBACKS FOR SECRETS)
# -----------------------------------------------------------------------------
# Google OAuth Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# JWT Secret
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}



# =============================================================================
# REDIS ? shared cache across all Railway pods
# =============================================================================
# Railway injects REDIS_URL as a full connection string: redis://:password@host:port
# Using .url takes precedence over host/port/password ? simpler for Railway.
# Remove spring.data.redis.url
spring.data.redis.host=redis-18454.c242.eu-west-1-2.ec2.cloud.redislabs.com
spring.data.redis.port=18454
spring.data.redis.username=default
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=false

# Or use spring.data.redis.ssl.enabled=true depending on your version

# Lettuce pool (commons-pool2 must be on the classpath ? see pom.xml note)
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.timeout=30000
spring.data.redis.lettuce.command-timeout=30000
spring.data.redis.lettuce.shutdown-timeout=200


spring.cache.type=redis

# ASYNC PROCESSING CONFIGURATION
# -----------------------------------------------------------------------------
# Defined in AsyncConfiguration.java

# -----------------------------------------------------------------------------
# SPRING BOOT PERFORMANCE TUNING
# -----------------------------------------------------------------------------
server.tomcat.threads.max=25
server.tomcat.threads.min-spare=5
server.tomcat.connection-timeout=10s

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# -----------------------------------------------------------------------------
# JACKSON JSON SERIALIZATION
# -----------------------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# -----------------------------------------------------------------------------
# LOGGING CONFIGURATION
# -----------------------------------------------------------------------------
logging.level.semicolon.africa.waylchub=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.data.mongodb=${MONGO_LOG_LEVEL:WARN}
logging.level.org.springframework.cache=${CACHE_LOG_LEVEL:INFO}
logging.level.org.springframework.scheduling=${SCHEDULING_LOG_LEVEL:INFO}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.file.name=logs/waylchub.log
logging.file.max-size=10MB
logging.file.max-history=30

# -----------------------------------------------------------------------------
# MONITORING & OBSERVABILITY
# -----------------------------------------------------------------------------
# Updated Monitoring for Spring Boot 3.x
management.endpoints.web.exposure.include=health,metrics,prometheus
management.prometheus.metrics.export.enabled=true
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# -----------------------------------------------------------------------------
# APPLICATION METADATA
# -----------------------------------------------------------------------------



spring.application.name=waylchub
server.port=${PORT:8080}
#spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}