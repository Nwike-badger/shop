# =============================================================================
# PRODUCTION-READY APPLICATION.PROPERTIES
# =============================================================================
# ? This file contains all critical configurations needed for 10,000+ orders/day
#
# WHAT'S CONFIGURED:
# 1. MongoDB Connection Pool (handles 500+ concurrent requests)
# 2. Redis Caching (reduces DB load by 80%)
# 3. Thread Pool Sizing (async event processing)
# 4. Monitoring & Observability
# 5. Performance Tuning
# =============================================================================

# -----------------------------------------------------------------------------
# MONGODB CONFIGURATION ? HIGH CONCURRENCY SETTINGS
# -----------------------------------------------------------------------------
# Using ENV variable for URI to easily switch between local and MongoDB Atlas
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/visit-aba}?maxPoolSize=300&minPoolSize=50&maxIdleTimeMS=60000&maxConnectionLifeTimeMS=300000&waitQueueTimeoutMS=5000&serverSelectionTimeoutMS=5000

spring.data.mongodb.database=${MONGO_DATABASE:visit-aba}
spring.data.mongodb.auto-index-creation=${MONGO_AUTO_INDEX:true}

app.admin.email=admin@waylchub.com
app.admin.password=ChangeMe123!

# Business Configuration
app.tax.vat-rate=${VAT_RATE:0.075}
app.shippingFee=${SHIPPING_FEE:0}

# Ensure events fire even outside transactions
spring.application.events.publish-asynchronously=true

# -----------------------------------------------------------------------------
# SECURITY SETTINGS & SECRETS (NO FALLBACKS FOR SECRETS)
# -----------------------------------------------------------------------------
# Google OAuth Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# JWT Secret
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# -----------------------------------------------------------------------------
# REDIS CACHING CONFIGURATION ? REDUCE DB LOAD BY 80%
# -----------------------------------------------------------------------------
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms

# Connection pool for Redis
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.min-idle=5

# Cache TTL (Time To Live)
spring.cache.redis.time-to-live=3600000
spring.cache.redis.key-prefix=waylchub:

# Enable caching (set to 'redis' in prod, 'none' for local testing if preferred)
spring.cache.type=${CACHE_TYPE:none}

# -----------------------------------------------------------------------------
# ASYNC PROCESSING CONFIGURATION
# -----------------------------------------------------------------------------
# Defined in AsyncConfiguration.java

# -----------------------------------------------------------------------------
# SPRING BOOT PERFORMANCE TUNING
# -----------------------------------------------------------------------------
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=50
server.tomcat.connection-timeout=20s

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# -----------------------------------------------------------------------------
# JACKSON JSON SERIALIZATION
# -----------------------------------------------------------------------------
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# -----------------------------------------------------------------------------
# LOGGING CONFIGURATION
# -----------------------------------------------------------------------------
logging.level.semicolon.africa.waylchub=${APP_LOG_LEVEL:INFO}
logging.level.org.springframework.data.mongodb=${MONGO_LOG_LEVEL:WARN}
logging.level.org.springframework.cache=${CACHE_LOG_LEVEL:INFO}
logging.level.org.springframework.scheduling=${SCHEDULING_LOG_LEVEL:INFO}

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

logging.file.name=logs/waylchub.log
logging.file.max-size=10MB
logging.file.max-history=30

# -----------------------------------------------------------------------------
# MONITORING & OBSERVABILITY
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.endpoint.health.probes.enabled=true

# -----------------------------------------------------------------------------
# APPLICATION METADATA
# -----------------------------------------------------------------------------
spring.application.name=waylchub
server.port=${PORT:8080}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}